<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Formulario para inteiração com usuário</title>
</head>
<body>
  <main>
    <form>
        <input type="text" name="user_name" placeholder="Digite seu nome">
        <input type="number" name="user_cpf" placeholder="Digite seu cpf" maxlength="11">
        <input type="password" name="user_password" placeholder="Digite sua senha">
        <input type="date" name="user_birthdate">
        <input type="time" name="user_breakfast_hour"> 
        <input type="email" name="user_email" placeholder="Digite seu email">
        <input type="file" name="user_resumer">
        <div>
          <input type="checkbox" name="user_disabilities" placeholder="disabilities">
          <label>Precisa de auxilio para executar as atividades?</label>
        </div>
        <div>
          <label>Já trabalhou na Empresa Antes?</label>
          <input type="radio" name="user_worker" placeholder="disabilities">
          <label>SIM</label>
          <input type="radio" name="user_worker" placeholder="disabilities">
          <label>NÃO</label>
        </div>
        <select nome="user_city">
          <option value="rio de janeiro">Rio de Janeiro</option>
          <option value="sao-paulo">São Paulo</option>
          <option value="baixada-fluminense">Baixada-Fluminense</option>
          <option value="natal">Natal</option> 
        </select>
        <textarea name="user_cover" rows="5"></textarea>
        <button type="submit">Enviar</button> 
    </form>
  </main>
</body>
</html>
